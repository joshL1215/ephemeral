  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

 24px;\n    }\n\n    .step-title {\n      font-size: 15px;\n      font-weight: 500;\n      letter-spacing: -0.01em;\n      margin-bottom: 6px;\n      color: var(--text);\n    }\n    .step-desc {\n      font-size: 13px;\n      color: var(--muted);\n      line-height: 1.7;\n    }\n    .step-code {\n      margin-top: 10px;\n      font-family: 'Space Mono', monospace;\n      font-size: 11px;\n      color: rgba(255,255,255,0.4);\n      display: inline-block;\n    }\n\n    /* arch */\n    .arch-diagram {\n      margin-top: 80px;\n      padding-top: 40px;\n      border-top: 1px solid var(--border);\n      max-width: 1000px;\n    }\n    .arch-flow {\n      display: flex;\n      align-items: center;\n      gap: 0;\n      flex-wrap: wrap;\n      row-gap: 16px;\n    }\n    .arch-node {\n      display: flex;\n      flex-direction: column;\n      align-items: center;\n      gap: 8px;\n    }\n    .arch-node-box {\n      padding: 12px 20px;\n      border: 1px solid var(--border);\n      border-radius: 6px;\n      font-size: 13px;\n      font-weight: 500;\n      color: var(--text);\n      white-space: nowrap;\n      min-width: 100px;\n      text-align: center;\n      position: relative;\n    }\n    .arch-node-box.active {\n      border-color: rgba(255,255,255,0.22);\n      background: var(--dim);\n    }\n    .arch-node-label {\n      font-size: 10px;\n      color: var(--muted);\n      font-family: 'Space Mono', monospace;\n      letter-spacing: 0.05em;\n    }\n    .arch-arrow {\n      width: 40px;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      padding-bottom: 22px;\n      flex-shrink: 0;\n    }\n    .ephem-tag {\n      position: absolute;\n      top: -9px; right: -9px;\n      background: var(--text);\n      color: var(--bg);\n      font-size: 8px;\n      font-family: 'Space Mono', monospace;\n      padding: 2px 6px;\n      border-radius: 4px;\n      letter-spacing: 0.04em;\n      animation: blink-tag 3.5s ease-in-out infinite;\n    }\n    @keyframes blink-tag {\n      0%, 75%, 100% { opacity: 1; }\n      85% { opacity: 0; }\n    }\n\n    /* ─── FOOTER ─── */\n    footer {\n      border-top: 1px solid var(--border);\n      padding: 32px 52px;\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      color: var(--muted);\n      font-size: 12px;\n      font-family: 'Space Mono', monospace;\n    }\n\n    @media (max-width: 720px) {\n      nav, #hero, #how, footer { padding-left: 24px; padding-right: 24px; }\n      .workflow { grid-template-columns: 1fr; gap: 48px; }\n      .hero-terminal { display: none; }\n      .arch-flow { flex-direction: column; }\n      .arch-arrow { transform: rotate(90deg); padding-bottom: 0; }\n    }\n  <\u002Fstyle>\n  \n\n<\u002Fhead><body>\n\n<nav>\n  <div class=\"nav-logo\">ephemeral.ai<\u002Fdiv>\n  <a href=\"#how\" class=\"nav-cta\">how it works ↓<\u002Fa>\n<\u002Fnav>\n\n<section id=\"hero\">\n  <canvas id=\"three-canvas\"><\u002Fcanvas>\n\n  <div class=\"hero-content\">\n    <h1 class=\"hero-headline\">ephemeral.ai<\u002Fh1>\n    <p class=\"hero-sub\">Agentic infrastructure for agentic sandboxes<\u002Fp>\n    <div class=\"hero-actions\">\n      <a href=\"#\" class=\"btn-white\">Access Dashboard →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n\n<\u002Fsection>\n\n<section id=\"how\">\n  <div class=\"section-label\">How it works<\u002Fdiv>\n\n  <div class=\"workflow\">\n\n    <div>\n      <div class=\"workflow-col-label\">For you<\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"step-num\">01<\u002Fdiv>\n        <div>\n          <div class=\"step-title\">Simple Python library<\u002Fdiv>\n          <div class=\"step-desc\">Wrap your own agent logic with the simple\nEphemeral SDK. Only a few lines of code.<\u002Fdiv>\n          <div class=\"step-code\">ephemeral run node:20 --with express<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"step-num\">02<\u002Fdiv>\n        <div>\n          <div class=\"step-title\">Hook up MCP<\u002Fdiv>\n          <div class=\"step-desc\">Add Ephemeral MCP to your agent to\ngive it access to on-demand code sandboxes<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"step-num\">03<\u002Fdiv>\n        <div>\n          <div class=\"step-title\">Done!<\u002Fdiv>\n          <div class=\"step-desc\">Whenever your custom agent wants to run\narbitrary code, it will be done quickly and securely\non our servers.&nbsp;<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div>\n      <div class=\"workflow-col-label\">Under the hood<\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"step-num\">01<\u002Fdiv>\n        <div>\n          <div class=\"step-title\">YOUR agent's logs are streamed to us<\u002Fdiv>\n          <div class=\"step-desc\">We ingest the context and conversation of your\nagent early&nbsp;<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"step-num\">02<\u002Fdiv>\n        <div>\n          <div class=\"step-title\">OUR agent uses that to predict what sandbox is needed<\u002Fdiv>\n          <div class=\"step-desc\">On our server, an agent analyzes your logs to predict\nwhat runtime and dependencies will be needed in a\nsandbox. The sandbox will be provisioned before your agent even generates code.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"step-num\">03<\u002Fdiv>\n        <div>\n          <div class=\"step-title\">MCP is called and we execute your code<\u002Fdiv>\n          <div class=\"step-desc\">Our MCP takes the code written by your agent, executes it in that container, then returns an output so that you do not have to worry about any delay.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <div class=\"arch-diagram\">\n    <div class=\"arch-flow\">\n      <div class=\"arch-node\">\n        <div class=\"arch-node-box\">CLI / SDK<\u002Fdiv>\n        <div class=\"arch-node-label\">you<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"arch-arrow\">\n        <svg width=\"28\" height=\"10\" viewBox=\"0 0 28 10\" fill=\"none\">\n          <path d=\"M0 5h24M18 1l6 4-6 4\" stroke=\"rgba(255,255,255,0.2)\" stroke-width=\"1.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"arch-node\">\n        <div class=\"arch-node-box active\">Orchestrator<\u002Fdiv>\n        <div class=\"arch-node-label\">control plane<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"arch-arrow\">\n        <svg width=\"28\" height=\"10\" viewBox=\"0 0 28 10\" fill=\"none\">\n          <path d=\"M0 5h24M18 1l6 4-6 4\" stroke=\"rgba(255,255,255,0.2)\" stroke-width=\"1.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"arch-node\">\n        <div class=\"arch-node-box active\" style=\"position:relative\">\n          Sandbox\n          <span class=\"ephem-tag\">ephemeral<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"arch-node-label\">isolated runtime<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"arch-arrow\">\n        <svg width=\"28\" height=\"10\" viewBox=\"0 0 28 10\" fill=\"none\">\n          <path d=\"M0 5h24M18 1l6 4-6 4\" stroke=\"rgba(255,255,255,0.2)\" stroke-width=\"1.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"arch-node\">\n        <div class=\"arch-node-box\">Teardown<\u002Fdiv>\n        <div class=\"arch-node-label\">zero trace<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer>\n  <span>ephemeral<\u002Fspan>\n  <span>HackTech 2026<\u002Fspan>\n<\u002Ffooter>\n\n<script>\n  // ─── THREE.JS ANIMATION ───\n  // Sequence: BUILD → ORB DASHES AROUND INSIDE → THRUST AWAY → RESET\n  const canvas = document.getElementById('three-canvas');\n  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });\n  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));\n\n  const scene = new THREE.Scene();\n  const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 200);\n  camera.position.set(0, 2.5, 9);\n  camera.lookAt(-2.0, 1.1, 0);\n\n  function resize() {\n    const hero = document.getElementById('hero');\n    const w = hero.clientWidth, h = hero.clientHeight;\n    renderer.setSize(w, h);\n    camera.aspect = w / h;\n    camera.updateProjectionMatrix();\n  }\n  resize();\n  window.addEventListener('resize', resize);\n\n  const group = new THREE.Group();\n  scene.add(group);\n\n  // ── BOX ──\n  const W = 3.2, H = 1.6, D = 1.6;\n  const boxGeo = new THREE.BoxGeometry(W, H, D);\n\n  const edgesGeo = new THREE.EdgesGeometry(boxGeo);\n  const edgePositions = edgesGeo.attributes.position.array;\n  const edgeLines = [];\n  for (let i = 0; i < edgePositions.length; i += 6) {\n    const geo = new THREE.BufferGeometry().setFromPoints([\n      new THREE.Vector3(edgePositions[i],   edgePositions[i+1], edgePositions[i+2]),\n      new THREE.Vector3(edgePositions[i+3], edgePositions[i+4], edgePositions[i+5]),\n    ]);\n    const mat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 });\n    group.add(new THREE.Line(geo, mat));\n    edgeLines.push(mat);\n  }\n  const EDGE_COUNT = edgeLines.length;\n\n  const solidMat = new THREE.MeshStandardMaterial({ color: 0x0d0d0d, transparent: true, opacity: 0, roughness: 1, depthWrite: false });\n  group.add(new THREE.Mesh(boxGeo, solidMat));\n\n  // ── ORB — layered ball of light ──\n  const orbGroup = new THREE.Group();\n  group.add(orbGroup);\n\n  // Core (bright white center)\n  const orbCoreMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0, depthTest: false });\n  const orbCore = new THREE.Mesh(new THREE.SphereGeometry(0.018, 16, 16), orbCoreMat);\n  orbGroup.add(orbCore);\n\n  // Inner glow\n  const orbInnerMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0, depthTest: false, blending: THREE.AdditiveBlending, side: THREE.FrontSide });\n  const orbInner = new THREE.Mesh(new THREE.SphereGeometry(0.04, 16, 16), orbInnerMat);\n  orbGroup.add(orbInner);\n\n  // Outer glow\n  const orbOuterMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0, depthTest: false, blending: THREE.AdditiveBlending, side: THREE.FrontSide });\n  const orbOuter = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), orbOuterMat);\n  orbGroup.add(orbOuter);\n\n  // Far glow\n  const orbFarMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0, depthTest: false, blending: THREE.AdditiveBlending, side: THREE.FrontSide });\n  const orbFar = new THREE.Mesh(new THREE.SphereGeometry(0.14, 16, 16), orbFarMat);\n  orbGroup.add(orbFar);\n\n  // Convenience: set all orb layers opacity at once\n  function setOrbOpacity(v) {\n    orbCoreMat.opacity = Math.min(1, v);\n    orbInnerMat.opacity = Math.min(1, v * 0.55);\n    orbOuterMat.opacity = Math.min(1, v * 0.22);\n    orbFarMat.opacity   = Math.min(1, v * 0.08);\n  }\n\n  // Alias so existing code referencing orbGroup.position works\n  const orb = orbGroup;\n  // Stub orbMat for opacity control (replaced by setOrbOpacity calls below)\n  const orbMat = { get opacity() { return orbCoreMat.opacity; }, set opacity(v) { setOrbOpacity(v); } };\n\n  // ── PERSISTENT PATH LINE — traces orb's movement ──\n  const PATH_MAX = 60;\n  const pathPositions = new Float32Array(PATH_MAX * 3);\n  const pathColors    = new Float32Array(PATH_MAX * 3);\n  const pathHistory   = Array.from({ length: PATH_MAX }, () => new THREE.Vector3());\n  let   pathLen       = 0; // how many valid points\n  const pathGeo = new THREE.BufferGeometry();\n  pathGeo.setAttribute('position', new THREE.BufferAttribute(pathPositions, 3));\n  pathGeo.setAttribute('color',    new THREE.BufferAttribute(pathColors, 3));\n  pathGeo.setDrawRange(0, 0);\n  const pathMat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 1, depthTest: false });\n  const pathLine = new THREE.Line(pathGeo, pathMat);\n  group.add(pathLine);\n  let trailAlpha = 0;\n\n  // ── THRUST SPEED LINES ──\n  const thrustMats = [];\n  for (let i = 0; i < 10; i++) {\n    const len = 0.4 + i * 0.25;\n    const tg = new THREE.BufferGeometry().setFromPoints([\n      new THREE.Vector3(0, 0, 0), new THREE.Vector3(-len, 0, 0),\n    ]);\n    const tm = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 });\n    const tl = new THREE.Line(tg, tm);\n    tl.position.set((Math.random()-0.5)*W*0.8, (Math.random()-0.5)*H*0.6, (Math.random()-0.5)*D*0.6);\n    group.add(tl);\n    thrustMats.push(tm);\n  }\n\n  scene.add(new THREE.AmbientLight(0xffffff, 0.6));\n  const dir = new THREE.DirectionalLight(0xffffff, 1.8);\n  dir.position.set(5, 8, 5);\n  scene.add(dir);\n\n  // ── HELPERS ──\n  function easeOut3(t)  { return 1 - Math.pow(1 - t, 3); }\n  function easeIn3(t)   { return t * t * t; }\n  function randomInsideBox(current) {\n    let pos, attempts = 0;\n    do {\n      pos = new THREE.Vector3(\n        (Math.random() - 0.5) * (W * 0.88),\n        (Math.random() - 0.5) * (H * 0.75),\n        (Math.random() - 0.5) * (D * 0.75),\n      );\n      attempts++;\n    } while (current && pos.distanceTo(current) < 1.8 && attempts < 20);\n    return pos;\n  }\n\n  function updateTrail(pos, alpha) {\n    trailAlpha = alpha;\n    // Add current pos to path history (prepend)\n    if (pathLen < PATH_MAX) pathLen++;\n    for (let i = pathLen - 1; i > 0; i--) pathHistory[i].copy(pathHistory[i-1]);\n    pathHistory[0].copy(pos);\n    // Write positions + gradient colors (bright at head, fade at tail)\n    for (let i = 0; i < pathLen; i++) {\n      pathPositions[i*3]   = pathHistory[i].x;\n      pathPositions[i*3+1] = pathHistory[i].y;\n      pathPositions[i*3+2] = pathHistory[i].z;\n      const brightness = Math.pow(1 - i / pathLen, 1.8) * alpha;\n      pathColors[i*3] = brightness; pathColors[i*3+1] = brightness; pathColors[i*3+2] = brightness;\n    }\n    pathGeo.attributes.position.needsUpdate = true;\n    pathGeo.attributes.color.needsUpdate = true;\n    pathGeo.setDrawRange(0, pathLen);\n  }\n\n  function clearTrail(pos) {\n    const p = pos || new THREE.Vector3();\n    pathLen = 1;\n    pathHistory[0].copy(p);\n    pathPositions[0] = p.x; pathPositions[1] = p.y; pathPositions[2] = p.z;\n    pathColors.fill(0);\n    pathGeo.attributes.position.needsUpdate = true;\n    pathGeo.attributes.color.needsUpdate = true;\n    pathGeo.setDrawRange(0, 0);\n    trailAlpha = 0;\n  }\n\n  // ── STATE MACHINE ──\n  // 0: BUILD   — edges draw in one by one\n  // 1: ORB_DASH — orb appears, dashes between positions with tracers\n  // 2: THRUST  — box shoots away to the right\n  // 3: PAUSE   — reset\n\n  const T = { build: 0.9, thrust: 0.35, pause: 0.4 };\n  const ORB_MOVE_TIME  = 0.1; // fast dash\n  const ORB_PAUSE_TIME = 0.22; // dwell at each position\n  const ORB_MOVES_TOTAL = 5;\n\n  let state = 0, stateT = 0;\n  let orbSubState = 'pause'; // 'move' | 'pause'\n  let orbSubT = 0;\n  let orbMovesDone = 0;\n  let orbFrom = new THREE.Vector3();\n  let orbTo   = randomInsideBox();\n\n  const clock = new THREE.Clock();\n  const THRUST_DIR = new THREE.Vector3(0.62, 0.03, 0.78).normalize();\n\n  function resetAll() {\n    group.position.set(0, 0, 0);\n    group.scale.set(1, 1, 1);\n    group.rotation.set(0, -0.9, 0);\n    edgeLines.forEach(m => m.opacity = 0);\n    solidMat.opacity = 0;\n    orbMat.opacity = 0;\n    thrustMats.forEach(m => m.opacity = 0);\n    orbSubState = 'pause';\n    orbSubT = 0;\n    orbMovesDone = 0;\n    orbTo = randomInsideBox(null);\n    orb.position.copy(orbTo);\n    clearTrail(orbTo);\n  }\n  resetAll();\n\n  function animate() {\n    requestAnimationFrame(animate);\n    const dt = Math.min(clock.getDelta(), 0.05);\n    stateT += dt;\n\n    if (state === 0) {\n      // BUILD — reveal edges one by one\n      const t = Math.min(stateT / T.build, 1);\n      const visible = t * EDGE_COUNT;\n      edgeLines.forEach((m, i) => {\n        m.opacity = easeOut3(Math.min(Math.max(visible - i, 0), 1)) * 0.85;\n      });\n      solidMat.opacity = t * 0.08;\n      if (t >= 1) { state = 1; stateT = 0; orbMat.opacity = 1; }\n\n    } else if (state === 1) {\n      // ORB DASHES AROUND\n      orbSubT += dt;\n\n      if (orbSubState === 'move') {\n        const t = Math.min(orbSubT / ORB_MOVE_TIME, 1);\n        orb.position.lerpVectors(orbFrom, orbTo, easeOut3(t));\n        updateTrail(orb.position, 0.7);\n        if (t >= 1) {\n          orb.position.copy(orbTo);\n          orbMovesDone++;\n          orbSubState = 'pause';\n          orbSubT = 0;\n          // gently flash edges on arrival\n          edgeLines.forEach(m => m.opacity = 1.0);\n        }\n      } else {\n        // PAUSE at position — fade line colors without adding points\n        trailAlpha = Math.max(0, 0.7 - orbSubT * 2.5);\n        for (let i = 0; i < pathLen; i++) {\n          const brightness = Math.pow(1 - i / pathLen, 1.8) * trailAlpha;\n          pathColors[i*3] = brightness; pathColors[i*3+1] = brightness; pathColors[i*3+2] = brightness;\n        }\n        pathGeo.attributes.color.needsUpdate = true;\n        // edges settle back\n        edgeLines.forEach(m => m.opacity = 0.7 + 0.15 * Math.sin(stateT * 6));\n        if (orbSubT >= ORB_PAUSE_TIME) {\n          if (orbMovesDone >= ORB_MOVES_TOTAL) {\n            // done — go to thrust\n            state = 2; stateT = 0;\n          } else {\n            orbFrom.copy(orbTo);\n            orbTo = randomInsideBox(orbFrom);\n            orbSubState = 'move';\n            orbSubT = 0;\n          }\n        }\n      }\n\n    } else if (state === 2) {\n      // THRUST — shoots right\n      const t = Math.min(stateT / T.thrust, 1);\n      const e = easeIn3(t);\n      group.position.copy(THRUST_DIR.clone().multiplyScalar(e * 22));\n      const fade = 1 - Math.pow(t, 1.5);\n      edgeLines.forEach(m => m.opacity = fade * 0.85);\n      orbMat.opacity = fade;\n      solidMat.opacity = fade * 0.08;\n      // fade path line during thrust\n      for (let i = 0; i < pathLen; i++) {\n        const brightness = Math.pow(1 - i / pathLen, 1.8) * fade * 0.8;\n        pathColors[i*3] = brightness; pathColors[i*3+1] = brightness; pathColors[i*3+2] = brightness;\n      }\n      pathGeo.attributes.color.needsUpdate = true;\n      if (t >= 1) { state = 3; stateT = 0; }\n\n    } else if (state === 3) {\n      // PAUSE\n      edgeLines.forEach(m => m.opacity = 0);\n      orbMat.opacity = 0;\n      thrustMats.forEach(m => m.opacity = 0);\n      if (stateT >= T.pause) { resetAll(); state = 0; stateT = 0; }\n    }\n\n    renderer.render(scene, camera);\n  }\n  animate();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
